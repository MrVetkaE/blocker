<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Блокировка экрана 20 сек</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        body {
            background: black;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-family: Arial, sans-serif;
            font-size: 24px;
            pointer-events: all; /* Перехватывает все касания */
        }
        #timer {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 18px;
            z-index: 10000;
        }
    </style>
</head>
<body>
    <div id="timer">20</div>
    <div id="overlay">Экран заблокирован на 20 секунд</div>

    <script>
        (function() {
            // Блокировка взаимодействия с экраном
            let seconds = 20;
            const timerEl = document.getElementById('timer');
            
            // Полностью блокируем все сенсорные события
            function blockTouch(e) {
                e.preventDefault();
                e.stopPropagation();
                return false;
            }
            
            // Блокируем касания, скролл, жесты
            document.addEventListener('touchstart', blockTouch, { passive: false });
            document.addEventListener('touchmove', blockTouch, { passive: false });
            document.addEventListener('touchend', blockTouch, { passive: false });
            document.addEventListener('touchcancel', blockTouch, { passive: false });
            
            // Блокируем клики мышкой (для десктопа)
            document.addEventListener('mousedown', blockTouch);
            document.addEventListener('mousemove', blockTouch);
            document.addEventListener('mouseup', blockTouch);
            
            // Блокируем клавиши (кроме громкости и питания, они аппаратные)
            document.addEventListener('keydown', blockTouch);
            document.addEventListener('keyup', blockTouch);
            
            // Блокируем контекстное меню
            document.addEventListener('contextmenu', blockTouch);
            
            // Отключаем скролл
            document.body.style.overflow = 'hidden';
            
            // Таймер обратного отсчета
            const interval = setInterval(() => {
                seconds--;
                timerEl.textContent = seconds;
                
                if (seconds <= 0) {
                    clearInterval(interval);
                    // Убираем блокировку
                    document.getElementById('overlay').style.display = 'none';
                    
                    // Удаляем обработчики событий
                    document.removeEventListener('touchstart', blockTouch);
                    document.removeEventListener('touchmove', blockTouch);
                    document.removeEventListener('touchend', blockTouch);
                    document.removeEventListener('touchcancel', blockTouch);
                    document.removeEventListener('mousedown', blockTouch);
                    document.removeEventListener('mousemove', blockTouch);
                    document.removeEventListener('mouseup', blockTouch);
                    document.removeEventListener('keydown', blockTouch);
                    document.removeEventListener('keyup', blockTouch);
                    document.removeEventListener('contextmenu', blockTouch);
                    
                    document.body.style.overflow = 'auto';
                    timerEl.style.display = 'none';
                }
            }, 1000);
            
            // Запрещаем выход из полноэкранного режима
            function lockFullScreen() {
                if (document.documentElement.requestFullscreen) {
                    document.documentElement.requestFullscreen();
                } else if (document.documentElement.webkitRequestFullscreen) {
                    document.documentElement.webkitRequestFullscreen();
                } else if (document.documentElement.msRequestFullscreen) {
                    document.documentElement.msRequestFullscreen();
                }
            }
            
            // Пытаемся включить полноэкранный режим
            lockFullScreen();
            
            // Возвращаем полноэкранный режим при попытке выхода
            document.addEventListener('fullscreenchange', lockFullScreen);
            document.addEventListener('webkitfullscreenchange', lockFullScreen);
            document.addEventListener('mozfullscreenchange', lockFullScreen);
            document.addEventListener('MSFullscreenChange', lockFullScreen);
            
            // Запрещаем сворачивание/переключение приложений (насколько это возможно в браузере)
            window.addEventListener('blur', function() {
                // Попытка вернуть фокус на окно
                window.focus();
            });
            
            // Держим экран включенным (запрос блокировки режима сна)
            let wakeLock = null;
            
            async function requestWakeLock() {
                try {
                    if ('wakeLock' in navigator) {
                        wakeLock = await navigator.wakeLock.request('screen');
                        wakeLock.addEventListener('release', () => {
                            // Если отпустили, запрашиваем снова
                            requestWakeLock();
                        });
                    }
                } catch (err) {
                    console.log('Wake Lock не поддерживается или не удался');
                }
            }
            
            requestWakeLock();
            
            // Если страница становится видимой, перезапрашиваем блокировку
            document.addEventListener('visibilitychange', () => {
                if (document.visibilityState === 'visible') {
                    requestWakeLock();
                    lockFullScreen();
                }
            });
            
        })();
    </script>
</body>
</html>
